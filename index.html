<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyPlanner</title>
    
    <!-- Modern Typography: Plus Jakarta Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Material Icons Round -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">

    <!-- Custom Styles -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Overlay for Mobile Sidebar -->
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

    <div class="app-shell">
        <!-- Sidebar Navigation Drawer -->
        <aside class="drawer" id="sideDrawer">
            <div class="drawer-header">
                <div class="logo-box">
                    <span class="material-icons-round">auto_graph</span>
                </div>
                <span class="logo-text">MyPlanner</span>
                <!-- Mobile only close button -->
                <button class="mobile-close-btn" onclick="toggleSidebar()">
                    <span class="material-icons-round">close</span>
                </button>
            </div>

            <nav class="drawer-nav">
                <p class="nav-section-label">WORKSPACE</p>
                <button class="nav-item active" data-filter="all" onclick="handleNavClick(this)">
                    <span class="material-icons-round">dashboard</span>
                    <span class="nav-text">All Items</span>
                </button>
                <button class="nav-item" data-filter="pending" onclick="handleNavClick(this)">
                    <span class="material-icons-round">radio_button_unchecked</span>
                    <span class="nav-text">Active Tasks</span>
                </button>
                <button class="nav-item" data-filter="completed" onclick="handleNavClick(this)">
                    <span class="material-icons-round">check_circle</span>
                    <span class="nav-text">Completed</span>
                </button>
            </nav>

            <!-- Bottom Stats Section -->
            <div class="drawer-footer">
                <div class="stat-card">
                    <div class="stat-header">
                        <span>Overall Progress</span>
                        <b id="progressValue">0%</b>
                    </div>
                    <div class="progress-bar-bg">
                        <div id="progressBar" class="progress-bar-fill"></div>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Workspace -->
        <main class="main-workspace">
            <header class="top-header">
                <div class="header-left">
                    <button class="menu-toggle" onclick="toggleSidebar()">
                        <span class="material-icons-round">menu</span>
                    </button>
                    <div class="search-bar">
                        <span class="material-icons-round">search</span>
                        <input type="text" id="searchInput" placeholder="Search tasks, goals...">
                        <kbd class="shortcut-hint">/</kbd>
                    </div>
                </div>
                
                <div class="header-right">
                    <div class="date-widget">
                        <span id="headerDate"></span>
                    </div>
                    <button class="fab-add" onclick="openFormModal()">
                        <span class="material-icons-round">add</span>
                        <span class="fab-text">New Task</span>
                    </button>
                </div>
            </header>

            <div class="scroll-container">
                <div class="content-header">
                    <div>
                        <h1 id="pageTitle">All Items</h1>
                        <p id="itemCountLabel" class="text-muted">0 entries found</p>
                    </div>
                </div>

                <!-- Empty State -->
                <div id="emptyState" class="empty-ui">
                    <div class="empty-illustration">
                        <span class="material-icons-round">description</span>
                    </div>
                    <h2>No items match your view</h2>
                    <p>Start your day by adding a new task or goal.</p>
                </div>

                <!-- Main Task Grid -->
                <div id="taskGrid" class="task-grid"></div>
            </div>
        </main>
    </div>

    <!-- Universal Modal System -->
    <div id="universalModal" class="modal-backdrop">
        <div class="modal-box">

            <!-- MODE 1: View Mode (Reading Details) -->
            <div id="viewMode" class="modal-view">
                <div class="modal-top">
                    <span class="tag-priority" id="viewPriority">High</span>
                    <button class="close-icon" onclick="closeModal()" aria-label="Close Modal">
                        <span class="material-icons-round">close</span>
                    </button>
                </div>
                
                <h2 id="viewTitleText" class="view-title">Task Title</h2>

                <!-- Property Bar for Metadata -->
                <div class="view-meta-bar">
                    <div class="meta-item">
                        <span class="material-icons-round">calendar_today</span>
                        <div class="meta-text">
                            <label>Due Date</label>
                            <span id="viewDateText">Select Date</span>
                        </div>
                    </div>
                    <div class="meta-separator"></div>
                    <div class="meta-item">
                        <span class="material-icons-round">layers</span>
                        <div class="meta-text">
                            <label>Category</label>
                            <span id="viewTypeText">Category</span>
                        </div>
                    </div>
                </div>

                <div class="view-content-label">Notes & Description</div>
                <div class="view-description-box" id="viewDescText"></div>

                <div class="modal-actions">
                    <button id="viewDeleteBtn" class="btn-danger-text">
                        <span class="material-icons-round">delete_outline</span>
                        Delete
                    </button>
                    <button id="viewEditBtn" class="btn-primary">
                        <span class="material-icons-round">edit</span>
                        Edit Details
                    </button>
                </div>
            </div>

            <!-- MODE 2: Form Mode (Adding/Editing) -->
            <form id="taskForm" class="modal-form hidden">
                <div class="modal-top">
                    <h2 id="formTitle">Add New Task</h2>
                    <button type="button" class="close-icon" onclick="closeModal()">
                        <span class="material-icons-round">close</span>
                    </button>
                </div>
                
                <div class="form-grid">
                    <div class="field">
                        <label>Task Title</label>
                        <input type="text" id="taskTitle" placeholder="What needs doing?" required maxlength="50">
                    </div>
                    <div class="field">
                        <label>Description (Notes)</label>
                        <textarea id="taskDesc" rows="3" placeholder="Add any extra details..."></textarea>
                    </div>
                    <div class="field-row">
                        <div class="field">
                            <label>Due Date</label>
                            <input type="date" id="taskDate" required>
                        </div>
                        <div class="field">
                            <label>Priority</label>
                            <select id="taskPriority">
                                <option value="Low">Low</option>
                                <option value="Medium" selected>Medium</option>
                                <option value="High">High</option>
                            </select>
                        </div>
                    </div>
                    <div class="field">
                        <label>Category</label>
                        <div class="type-selector">
                            <input type="radio" name="itemType" value="Task" id="catTask" checked>
                            <label for="catTask">Daily Task</label>
                            <input type="radio" name="itemType" value="Goal" id="catGoal">
                            <label for="catGoal">Long-term Goal</label>
                        </div>
                    </div>
                </div>
                
                <div class="modal-actions">
                    <button type="button" class="btn-secondary-flat" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn-primary">
                        <span class="material-icons-round">check</span>
                        Save Entry
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Feedback Notification -->
    <div id="toast" class="toast-popup">Action completed</div>

    <script src="script.js"></script>
</body>
</html>
