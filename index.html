<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyPlanner</title>
    <!-- Favicon -->
    <link rel="icon" href="favicon.ico" type="image/x-icon">

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>


    <!-- Modern Typography & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">

    <!-- Custom Styles -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Mobile Navigation Overlay -->
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

    <div class="app-shell">
        <!-- Navigation Sidebar -->
        <aside class="drawer" id="sideDrawer">
            <div class="drawer-header">
                <div class="logo-box">
                    <span class="material-icons-round">auto_graph</span>
                </div>
                <span class="logo-text">MyPlanner</span>
                <button class="mobile-close-btn" onclick="toggleSidebar()">
                    <!-- <span class="material-icons-round">close</span> -->
                </button>
            </div>

            <nav class="drawer-nav">
                <p class="nav-section-label">WORKSPACE</p>
                <button class="nav-item active" data-filter="all" onclick="handleNavClick(this)">
                    <span class="material-icons-round">dashboard</span>
                    <span class="nav-text">All Items</span>
                </button>
                <button class="nav-item" data-filter="pending" onclick="handleNavClick(this)">
                    <span class="material-icons-round">radio_button_unchecked</span>
                    <span class="nav-text">Active Tasks</span>
                </button>
                <button class="nav-item" data-filter="completed" onclick="handleNavClick(this)">
                    <span class="material-icons-round">check_circle</span>
                    <span class="nav-text">Completed</span>
                </button>
            </nav>

            <div class="drawer-footer">
                <div class="stat-card">
                    <div class="stat-header">
                        <span>Overall Progress</span>
                        <b id="progressValue">0%</b>
                    </div>
                    <div class="progress-bar-bg">
                        <div id="progressBar" class="progress-bar-fill"></div>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="main-workspace">
            <header class="top-header">
                <div class="header-left">
                    <button class="menu-toggle" onclick="toggleSidebar()">
                        <span class="material-icons-round">menu</span>
                    </button>
                    <div class="search-bar">
                        <span class="material-icons-round">search</span>
                        <input type="text" id="searchInput" placeholder="Search anything...">
                        <kbd class="shortcut-hint">/</kbd>
                    </div>
                </div>
                
                <div class="header-right">
                    <div class="date-widget">
                        <span id="headerDate"></span>
                    </div>
                    <button class="fab-add" onclick="openFormModal()">
                        <span class="material-icons-round">add</span>
                        <span class="fab-text">New Task</span>
                    </button>
                </div>
            </header>

            <div class="scroll-container">
                <div class="content-header">
                    <div>
                        <h1 id="pageTitle">All Items</h1>
                        <p id="itemCountLabel" class="text-muted">0 entries found</p>
                    </div>
                </div>

                <!-- Empty State Message -->
                <div id="emptyState" class="empty-ui">
                    <div class="empty-illustration">
                        <span class="material-icons-round">description</span>
                    </div>
                    <h2>No items match your view</h2>
                    <p>Start your day by adding a new task or goal.</p>
                </div>

                <!-- Responsive Task Grid -->
                <div id="taskGrid" class="task-grid">
                    <!-- Tasks injected by script.js -->
                </div>
            </div>
        </main>
    </div>

    <!-- Multi-purpose Modal -->
    <div id="universalModal" class="modal-backdrop">
        <div class="modal-box">
            <!-- View Mode -->
            <div id="viewMode" class="modal-view">
                <div class="modal-top">
                    <span class="tag-priority" id="viewPriority">High</span>
                    <button class="close-icon" onclick="closeModal()"><span class="material-icons-round">close</span></button>
                </div>
                <h2 id="viewTitleText">Task Title</h2>
                <div class="view-meta">
                    <div class="meta-item"><span class="material-icons-round">calendar_today</span> <span id="viewDateText"></span></div>
                    <div class="meta-item"><span class="material-icons-round">flag</span> <span id="viewTypeText"></span></div>
                </div>
                <div class="view-description" id="viewDescText"></div>
                <div class="modal-actions">
                    <button id="viewDeleteBtn" class="btn-danger-text">Remove</button>
                    <button id="viewEditBtn" class="btn-primary">Edit Details</button>
                </div>
            </div>

            <!-- Form Mode -->
            <form id="taskForm" class="modal-form hidden">
                <div class="modal-top card-title mb-3">
                    <h2 id="formTitle">Add New Task</h2>
                </div>
                <div class="form-grid">
                    <div class="field">
                        <label>Task Title</label>
                        <input type="text" id="taskTitle" placeholder="What needs doing?" required maxlength="50">
                    </div>
                    <div class="field">
                        <label>Description (Notes)</label>
                        <textarea id="taskDesc" rows="3" placeholder="Add any extra details..."></textarea>
                    </div>
                    <div class="field-row">
                        <div class="field">
                            <label>Due Date</label>
                            <input type="date" id="taskDate" required>
                        </div>
                        <div class="field">
                            <label>Priority</label>
                            <select id="taskPriority">
                                <option value="Low">Low</option>
                                <option value="Medium" selected>Medium</option>
                                <option value="High">High</option>
                            </select>
                        </div>
                    </div>
                    <div class="field">
                        <label>Category</label>
                        <div class="type-selector">
                            <input type="radio" name="itemType" value="Task" id="catTask" checked>
                            <label for="catTask">Daily Task</label>
                            <input type="radio" name="itemType" value="Goal" id="catGoal">
                            <label for="catGoal">Long-term Goal</label>
                        </div>
                    </div>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-sm btn-secondary" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn btn-sm btn-primary">Save</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast-popup">Action completed</div>

    <script src="script.js"></script>
</body>
</html>
